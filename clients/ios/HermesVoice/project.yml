name: HermesVoice
options:
  bundleIdPrefix: com.yuanfang
  deploymentTarget:
    iOS: "26.5"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    PRODUCT_NAME: HermesVoice
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  HermesVoice:
    type: application
    platform: iOS
    sources:
      - path: HermesVoice
    settings:
      base:
        INFOPLIST_FILE: HermesVoice/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yuanfang.hermesvoice
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: HermesVoice/Info.plist
      properties:
        CFBundleDisplayName: HermesVoice
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "HermesVoice needs microphone access to listen to your voice commands."
        NSLocalNetworkUsageDescription: "HermesVoice connects to your local yuanfang-brain server."
        NSBonjourServices:
          - "_yuanfang._tcp"
